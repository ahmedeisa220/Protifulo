<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحديث AE Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; margin: 0; font-family: 'Cairo', sans-serif; }
        .hero-section { padding: 40px 20px; text-align: center; flex-grow: 1; display: flex; align-items: center; }
        .update-card { background: white; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.08); max-width: 700px; margin: 0 auto; padding: 40px 30px; border: 1px solid rgba(0,0,0,0.05); }
        .app-logo { width: 90px; height: 90px; margin-bottom: 20px; border-radius: 22%; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .badge-new { background: #E8F5E9; color: #2E7D32; padding: 4px 12px; border-radius: 50px; font-weight: 700; font-size: 0.85rem; display: inline-block; margin-bottom: 15px; }
        .main-title { font-weight: 900; color: #1d1d1f; font-size: 2.2rem; margin-bottom: 15px; }
        .description { color: #636366; font-size: 1.1rem; line-height: 1.6; margin-bottom: 35px; }
        .app-links-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .badge-img { height: 52px; width: auto; transition: transform 0.2s ease; border-radius: 8px; }
        .badge-img:hover { transform: scale(1.05); }
        .note-box { background: #FFF9C4; padding: 15px; border-radius: 12px; font-size: 0.9rem; color: #827717; border-right: 5px solid #FBC02D; text-align: right; margin-top: 20px; }
        @media (max-width: 768px) { .main-title { font-size: 1.6rem; } .badge-img { height: 48px; } }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="container" style="width: 100%;">
            <div class="update-card">
                <img src="logo.png" alt="AE Academy" class="app-logo">
                <div><div class="badge-new">الجيل الجديد 2.0</div></div>
                <h1 class="main-title">يرجى تحديث التطبيق</h1>
                <p class="description">
                    لقد قمنا بتحديث المنصة بالكامل لنقدم لك تجربة تعليمية أسرع وأكثر سلاسة.<br>
                    <strong>يرجى تحميل التحديث الجديد وإنشاء حسابك مرة أخرى للبدء.</strong>
                </p>
                <div class="app-links-container">
                    <a href="https://play.google.com/store/apps/details?id=com.ahmed.eisa" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play" class="badge-img">
                    </a>
                    <a href="https://apps.apple.com/eg/app/ae-academy/id6748572590" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg" alt="App Store" class="badge-img">
                    </a>
                    <a href="https://t.me/AE_Academy_channel/5" target="_blank">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f7/Get_it_from_Microsoft_Badge.svg" alt="Microsoft Store" class="badge-img">
                    </a>
                </div>
                <div class="note-box">
                    💡 ملاحظة: نظراً لانتقالنا إلى خوادم جديدة، ستحتاج لإنشاء حساب جديد عند الدخول لأول مرة على التطبيق المحدث.
                </div>
            </div>
        </div>
    </section>
</body>
</html>
